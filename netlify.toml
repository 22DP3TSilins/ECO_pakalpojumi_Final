[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so Vue Router routes (/products, /profile, etc.) don't 404 on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Allow Google Identity Services popup to communicate back via postMessage
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
