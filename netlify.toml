[build]
  command = "npm run build"
  publish = "dist"

# SPA rezerves variants, lai Vue Router maršruti (/products, /profile, u.c.) pārlādesā nedotu 404 kļūdu
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Atļauj Google Identity Services uznirstošajam logam sazināties atpakaļ, izmantojot postMessage
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
